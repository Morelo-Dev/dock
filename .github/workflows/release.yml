name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Versioning & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write       # para crear releases y commits de versión
      pull-requests: write  # para abrir el PR de changeset
      id-token: write       # para npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesario para que changeset pueda leer el historial completo
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build:core

      # Changesets crea automáticamente un PR llamado "Version Packages".
      # Cuando ese PR se mergea a main, este step publica a npm.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
