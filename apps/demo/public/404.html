<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>@deandre-dock/buttons</title>
  <script>
    // GitHub Pages SPA redirect — preserves the path for index.html to restore
    var l = window.location
    var base = '/dock'
    var path = l.pathname.slice(base.length) || '/'
    l.replace(
      l.origin + base +
      '/?/' + path.replace(/^\//, '') +
      (l.search ? '~' + l.search.slice(1) : '') +
      l.hash
    )
  </script>
</head>
<body></body>
</html>
